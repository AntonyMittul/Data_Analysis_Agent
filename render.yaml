# Render Blueprint for the DataSense AI backend (FastAPI).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Then set GOOGLE_API_KEY in the service's Environment tab (it is not committed).
services:
  - type: web
    name: datasense-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: GOOGLE_API_KEY
        sync: false   # set this secret in the Render dashboard
